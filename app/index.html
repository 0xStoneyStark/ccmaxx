<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1b1714; --card:#241e18; --card-hover:#2c251d;
    --border:rgba(245,239,232,0.08); --text:#f4ede4; --dim:#9c9085;
    --accent:#D97757; --accent-soft:rgba(217,119,87,0.30); --titlebar:#15110e;
    --card-radius:12px; --ui:'Hanken Grotesk',sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{width:100%;height:100%;margin:0;background:transparent;overflow:hidden;
    font-family:var(--ui);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;user-select:none;}
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-thumb{background:rgba(245,239,232,0.14);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(245,239,232,0.26);}
  input{font-family:var(--ui);}
  .hidden{display:none !important;}
  @keyframes ccm-panel-in{from{opacity:0;transform:scale(.985) translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes ccm-card-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes ccm-pop{from{opacity:0;transform:scale(.9);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){[data-anim],.panel{animation:none !important;}*{transition-duration:.01ms !important;}}

  /* ---- PANEL ---- */
  .panel{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
    background:var(--bg);border:1px solid var(--border);border-radius:14px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);animation:ccm-panel-in .42s cubic-bezier(.16,1,.3,1) both;}

  .titlebar{flex:0 0 auto;height:46px;display:flex;align-items:center;gap:8px;padding:0 8px 0 13px;
    background:var(--titlebar);border-bottom:1px solid var(--border);-webkit-app-region:drag;}
  .brand{display:flex;align-items:center;gap:6px;font-weight:700;font-size:13.5px;letter-spacing:-.01em;color:var(--text);}
  .brand svg{color:var(--accent);}
  .tabs{display:flex;gap:2px;margin-left:6px;background:rgba(127,127,127,.12);padding:3px;border-radius:8px;-webkit-app-region:no-drag;}
  .tab{border:none;cursor:pointer;font-family:var(--ui);font-size:12px;font-weight:600;padding:5px 13px;border-radius:6px;
    transition:background .2s,color .2s,box-shadow .2s;letter-spacing:-.01em;background:transparent;color:var(--dim);}
  .tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.35);}
  .spacer{flex:1;}
  .ctrls{display:flex;align-items:center;gap:1px;-webkit-app-region:no-drag;}
  .ib{width:30px;height:30px;display:grid;place-items:center;border-radius:7px;background:transparent;border:none;cursor:pointer;
    color:var(--dim);transition:background .15s,color .15s;}
  .ib:hover{background:rgba(127,127,127,.14);color:var(--text);}
  .ib.close:hover{background:rgba(217,119,87,.18);color:var(--accent);}
  .ib.pinned{color:var(--accent);}

  .body{position:relative;flex:1 1 auto;overflow:hidden;}
  .pane{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .3s ease,transform .34s cubic-bezier(.16,1,.3,1);}
  .pane.ins{overflow-y:auto;}
  #paneInsights{opacity:1;transform:translateX(0);}
  #paneCheats{opacity:0;transform:translateX(10px);pointer-events:none;}
  body.cheats #paneInsights{opacity:0;transform:translateX(-10px);pointer-events:none;}
  body.cheats #paneCheats{opacity:1;transform:translateX(0);pointer-events:auto;}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px 14px 4px;}
  .statcard{background:var(--card);border:1px solid var(--border);border-radius:var(--card-radius);padding:12px 12px 11px;
    animation:ccm-card-in .4s cubic-bezier(.16,1,.3,1) both;}
  .statcard .num{font-weight:800;font-size:25px;letter-spacing:-.02em;line-height:1;color:var(--text);}
  .statcard .lbl{margin-top:6px;font-size:11px;color:var(--dim);}
  .sectlabel{display:flex;align-items:center;gap:6px;padding:15px 16px 9px;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;}
  .sectlabel svg{color:var(--accent);}
  .suglist{display:flex;flex-direction:column;gap:8px;padding:0 14px 16px;}
  .sugcard{background:var(--card);border:1px solid var(--border);border-radius:var(--card-radius);padding:13px;
    transition:transform .2s cubic-bezier(.16,1,.3,1),box-shadow .2s,border-color .2s;animation:ccm-card-in .4s cubic-bezier(.16,1,.3,1) both;}
  .sugcard:hover{transform:translateY(-2px);box-shadow:0 12px 26px -12px rgba(0,0,0,.6);border-color:var(--accent-soft);}
  .sugcard .top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .sugcard .hd{font-size:13px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
  .sugcard .rs{margin-top:5px;font-size:11.5px;line-height:1.45;color:var(--dim);}
  .tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-family:var(--mono);font-size:8.5px;
    letter-spacing:.12em;text-transform:uppercase;flex:0 0 auto;white-space:nowrap;margin-top:1px;}
  .tag.high{background:rgba(217,119,87,.16);color:#E8855F;}
  .tag.med{background:rgba(224,163,94,.16);color:#E0A35E;}
  .tag.low{background:rgba(127,127,127,.14);color:var(--dim);}

  .searchwrap{flex:0 0 auto;padding:12px 14px 8px;}
  .searchbox{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;}
  .searchbox svg{color:var(--dim);flex:0 0 auto;}
  .searchbox input{flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-size:12.5px;}
  .searchbox input::placeholder{color:var(--dim);}
  .catlist{flex:1 1 auto;overflow-y:auto;padding:0 14px 14px;}
  .cat{border-bottom:1px solid var(--border);}
  .cathead{width:100%;display:flex;align-items:center;gap:9px;padding:12px 2px;background:transparent;border:none;cursor:pointer;}
  .cathead .dot{width:7px;height:7px;border-radius:2px;flex:0 0 auto;}
  .cathead .nm{font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--text);}
  .cathead .ct{font-family:var(--mono);font-size:10px;color:var(--dim);}
  .cathead .chev{display:inline-flex;color:var(--dim);transition:transform .3s cubic-bezier(.16,1,.3,1);margin-left:auto;}
  .cat.collapsed .chev{transform:rotate(-90deg);}
  .catbody{display:grid;grid-template-rows:1fr;opacity:1;transition:grid-template-rows .32s cubic-bezier(.16,1,.3,1),opacity .26s ease;}
  .cat.collapsed .catbody{grid-template-rows:0fr;opacity:0;}
  .catbody>div{overflow:hidden;min-height:0;}
  .rows{display:flex;flex-direction:column;gap:4px;padding-bottom:11px;}
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;padding:9px 10px 9px 11px;
    border:1px solid var(--border);border-radius:8px;background:var(--card);cursor:pointer;text-align:left;
    transition:transform .15s cubic-bezier(.16,1,.3,1),background .25s,border-color .2s;-webkit-app-region:no-drag;}
  .row:hover{transform:translateY(-1px);background:var(--card-hover);border-color:var(--accent-soft);}
  .row.flash{background:rgba(72,170,112,.20);border-color:rgba(72,170,112,.55);}
  .row .txt{min-width:0;text-align:left;}
  .row .lab{display:block;font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .nt{display:block;margin-top:2px;font-size:10.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .row .cp{width:26px;height:26px;flex:0 0 auto;display:grid;place-items:center;border-radius:6px;color:var(--dim);transition:color .2s,background .2s;}
  .row.flash .cp{color:#5fcf95;background:rgba(72,170,112,.14);}

  .status{flex:0 0 auto;height:33px;display:flex;align-items:center;gap:7px;padding:0 14px;background:var(--titlebar);
    border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--dim);transition:color .2s;}
  .status.copied{color:var(--accent);}
  .status span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* ---- bubble + restore ---- */
  /* pills FILL their window (no box-in-box) and are CLICK-to-expand.
     No -webkit-app-region:drag here — Electron drag regions swallow click events. */
  .pill{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;padding:0 14px;
    background:var(--titlebar);border:1px solid var(--border);border-radius:12px;
    cursor:pointer;animation:ccm-pop .3s cubic-bezier(.16,1,.3,1) both;}
  .pill:hover{background:var(--card-hover);}
  #bubble svg{color:var(--accent);}
  #bubble .b1{font-size:12.5px;font-weight:700;color:var(--text);}
  #bubble .b2{font-size:11.5px;color:var(--dim);}
  #restore{background:var(--accent);color:#1c1712;border:none;font-size:11.5px;font-weight:800;}
  #restore:hover{background:var(--accent);}
  #restore svg{color:#1c1712;}
</style>
</head>
<body>

<!-- PANEL -->
<div id="panel" class="panel">
  <div class="titlebar">
    <div class="brand"><svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"></path></svg><span>ccmaxx</span></div>
    <div class="tabs">
      <button class="tab on" id="tabIns">Insights</button>
      <button class="tab" id="tabChe">Cheats</button>
    </div>
    <span class="spacer"></span>
    <div class="ctrls">
      <button class="ib" id="pinBtn" title="Pin on top"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M9 3h6l-1.2 7L17 13H7l3.2-3z"></path></svg></button>
      <button class="ib" id="minBtn" title="Minimize"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="12" x2="18" y2="12"></line></svg></button>
      <button class="ib close" id="closeBtn" title="Close"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"></line><line x1="18" y1="6" x2="6" y2="18"></line></svg></button>
    </div>
  </div>

  <div class="body">
    <div class="pane ins" id="paneInsights">
      <div class="statgrid" id="statgrid"></div>
      <div class="sectlabel"><svg viewBox="0 0 24 24" width="11" height="11" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"></path></svg><span>for you</span></div>
      <div class="suglist" id="suglist"></div>
    </div>
    <div class="pane" id="paneCheats">
      <div class="searchwrap">
        <div class="searchbox">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.6" y2="16.6"></line></svg>
          <input id="search" type="text" spellcheck="false" autocomplete="off" placeholder="search skills, agents, loops, prompts…">
        </div>
      </div>
      <div class="catlist" id="catlist"></div>
    </div>
  </div>

  <div class="status" id="status"><span id="statusText">click any row to copy → paste into Claude Code</span></div>
</div>

<!-- BUBBLE -->
<div id="bubble" class="pill hidden">
  <svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"></path></svg>
  <span class="b1">ccmaxx</span><span class="b2">— click to expand</span>
</div>

<!-- RESTORE -->
<div id="restore" class="pill hidden">
  <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z"></path></svg>
  <span>restore</span>
</div>

<script>
// Generic placeholder shown only before the first `ccmaxx scan` (no real data yet).
// Real values come from the user's own machine via ccApi — nothing personal is bundled.
const FALLBACK = {
  stats: [
    {value:'—',label:'est. compute',num:0,prefix:'$',dec:0},
    {value:'—',label:'AI messages',num:0,dec:0},
    {value:'—',label:'tool calls',num:0,dec:0},
    {value:'—',label:'active days',num:0,dec:0},
    {value:'—',label:'top model',num:0,dec:0},
    {value:'—',label:'agents spawned',num:0,dec:0}],
  suggestions: [
    {headline:'Run your first scan',reason:'Run  ccmaxx scan  to analyze your Claude Code logs locally.',tag:'low'}],
  rows: []
};
const CAT_META = [
  {name:'SKILLS',color:'#D97757'},{name:'AGENTS',color:'#6EA8C7'},{name:'LOOPS',color:'#C58AC0'},
  {name:'PROMPTS',color:'#E2B23C'},{name:'MODEL & COST',color:'#5FB28F'},{name:'SETTINGS',color:'#9AA0AD'}
];
const SIZES = { panel:[380,620], bubble:[232,52], restore:[150,46] };
const api = () => window.ccApi || null;
const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let STATS=[], SUGS=[], ROWS=[], collapsed={}, search='', statusTimer=null, copyTimer=null, reduced=false;

function loadData(){
  const a = api();
  const d = (a && a.reload) ? a.reload() : a;
  STATS = (d && d.stats && d.stats.length) ? d.stats : FALLBACK.stats;
  SUGS  = (d && d.suggestions && d.suggestions.length) ? d.suggestions : FALLBACK.suggestions;
  ROWS  = (d && d.rows && d.rows.length) ? d.rows : FALLBACK.rows;
}

function countTo(el,c){
  if(reduced){ el.textContent=c.value; return; }
  const dur=950,t0=performance.now(),pre=c.prefix||'',suf=c.suffix||'',dec=c.dec||0;
  const tick=(now)=>{ let p=Math.min(1,(now-t0)/dur); p=1-Math.pow(1-p,3); const v=c.num*p;
    el.textContent=pre+(dec?v.toFixed(dec):Math.round(v))+suf;
    if(p<1)requestAnimationFrame(tick); else el.textContent=c.value; };
  requestAnimationFrame(tick);
}
function renderInsights(){
  const sg=$('statgrid'); sg.innerHTML='';
  STATS.forEach((c,i)=>{ const d=document.createElement('div'); d.className='statcard'; d.style.animationDelay=(i*45)+'ms';
    d.innerHTML='<div class="num"></div><div class="lbl">'+esc(c.label)+'</div>'; sg.appendChild(d);
    countTo(d.querySelector('.num'),c); });
  const sl=$('suglist'); sl.innerHTML='';
  SUGS.forEach((c,i)=>{ const d=document.createElement('div'); d.className='sugcard'; d.style.animationDelay=(i*55)+'ms';
    const tag=['high','med','low'].includes(c.tag)?c.tag:'low';
    d.innerHTML='<div class="top"><div class="hd">'+esc(c.headline)+'</div><span class="tag '+tag+'">'+tag+'</span></div><div class="rs">'+esc(c.reason)+'</div>';
    sl.appendChild(d); });
}
function renderCheats(){
  const q=search.trim().toLowerCase();
  const list=$('catlist'); list.innerHTML='';
  CAT_META.forEach(meta=>{
    let rows=ROWS.filter(r=>r.category===meta.name);
    if(q) rows=rows.filter(r=>((r.label||'')+' '+(r.note||'')).toLowerCase().includes(q));
    if(!rows.length) return;
    const isCol = q ? false : !!collapsed[meta.name];
    const cat=document.createElement('div'); cat.className='cat'+(isCol?' collapsed':'');
    const rowsHtml = rows.map(r=>{
      const id=meta.name+'/'+r.label;
      return '<button class="row" data-id="'+esc(id)+'"><span class="txt"><span class="lab">'+esc(r.label)+'</span><span class="nt">'+esc(r.note||'')+'</span></span>'+
        '<span class="cp">'+copyIcon+'</span></button>';
    }).join('');
    cat.innerHTML='<button class="cathead"><span class="dot" style="background:'+meta.color+'"></span>'+
      '<span class="nm">'+meta.name+'</span><span class="ct">'+rows.length+'</span>'+
      '<span class="chev"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span></button>'+
      '<div class="catbody"><div><div class="rows">'+rowsHtml+'</div></div></div>';
    cat.querySelector('.cathead').onclick=()=>{ collapsed[meta.name]=!isCol; renderCheats(); };
    cat.querySelectorAll('.row').forEach(btn=>{
      const id=btn.getAttribute('data-id');
      const r=rows.find(x=>(meta.name+'/'+x.label)===id);
      btn.onclick=()=>copyRow(r,btn);
    });
    list.appendChild(cat);
  });
}
const copyIcon='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"></rect><path d="M5 15V5a2 2 0 0 1 2-2h10"></path></svg>';
const checkIcon='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function copyRow(r,btn){
  if(!r) return;
  if(api()&&api().copy) api().copy(r.copy); else if(navigator.clipboard) navigator.clipboard.writeText(r.copy).catch(()=>{});
  btn.classList.add('flash'); btn.querySelector('.cp').innerHTML=checkIcon;
  clearTimeout(this&&this._f); setTimeout(()=>{ btn.classList.remove('flash'); btn.querySelector('.cp').innerHTML=copyIcon; },650);
  const st=$('status'), t=$('statusText');
  st.classList.add('copied'); t.textContent='copied: '+r.label;
  clearTimeout(statusTimer); statusTimer=setTimeout(()=>{ st.classList.remove('copied'); t.textContent='click any row to copy → paste into Claude Code'; },1600);
}
function setTab(t){ document.body.classList.toggle('cheats',t==='cheats'); $('tabIns').classList.toggle('on',t!=='cheats'); $('tabChe').classList.toggle('on',t==='cheats'); }
let pinned=true;
function togglePin(){ pinned=!pinned; $('pinBtn').classList.toggle('pinned',pinned); if(api()&&api().setOnTop) api().setOnTop(pinned); }
function show(which){
  $('panel').classList.toggle('hidden',which!=='panel');
  $('bubble').classList.toggle('hidden',which!=='bubble');
  $('restore').classList.toggle('hidden',which!=='restore');
  const [w,h]=SIZES[which];
  if(api()&&api().setState) api().setState(w,h,which==='restore'?'br':null);
}

function init(){
  reduced=!!(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches);
  loadData(); renderInsights(); renderCheats();
  $('pinBtn').classList.toggle('pinned',pinned);
  $('tabIns').onclick=()=>setTab('insights');
  $('tabChe').onclick=()=>setTab('cheats');
  $('pinBtn').onclick=togglePin;
  $('minBtn').onclick=()=>show('bubble');
  $('closeBtn').onclick=()=>show('restore');
  $('bubble').onclick=()=>{ show('panel'); };
  $('restore').onclick=()=>{ show('panel'); };
  $('search').addEventListener('input',e=>{ search=e.target.value; renderCheats(); });
  if(api()&&api().onUpdate) api().onUpdate(()=>{ loadData(); renderInsights(); renderCheats(); });
}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
